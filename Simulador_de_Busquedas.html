<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Visualizador Interactivo de Algoritmos de Búsqueda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .controls {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        select, input, button {
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary { background: linear-gradient(45deg, #51cf66, #40c057); }
        .btn-secondary { background: linear-gradient(45deg, #fa5252, #e03131); }
        .btn-warning { background: linear-gradient(45deg, #feca57, #f0932b); }

        .visualizer {
            padding: 40px;
            text-align: center;
            position: relative;
        }

        canvas {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: white;
            max-width: 100%;
            height: 500px;
        }

        .stats {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 15px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            display: block;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .speed-slider {
            flex: 1;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            button, select, input {
                width: 100%;
            }
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Visualizador de Algoritmos</h1>
            <p>Explora Búsqueda Lineal, Binaria e Interpolada en tiempo real</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Algoritmo:</label>
                <select id="algorithm">
                    <option value="linear">Búsqueda Lineal</option>
                    <option value="binary">Búsqueda Binaria</option>
                    <option value="interpolated">Búsqueda Interpolada</option>
                </select>
            </div>

            <div class="control-group">
                <label>Tamaño Array:</label>
                <input type="range" id="arraySize" min="5" max="50" value="20">
                <span id="sizeValue">20</span>
            </div>

            <div class="control-group">
                <label>Velocidad:</label>
                <div class="speed-control">
                    <span id="speedText">Normal</span>
                    <input type="range" id="speed" min="100" max="2000" value="600" class="speed-slider">
                </div>
            </div>

            <button onclick="generateArray()" class="btn-warning">🎲 Nuevo Array</button>
            <button onclick="startSearch()" class="btn-primary">▶️ Iniciar</button>
            <button onclick="pauseSearch()" class="btn-secondary">⏸️ Pausar</button>
            <button onclick="reset()" class="btn-secondary">🔄 Reset</button>
        </div>

        <div class="visualizer">
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #74c0fc;"></div>
                    <span>Normal</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff6b6b;"></div>
                    <span>Actual</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #51cf66;"></div>
                    <span>¡Encontrado!</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #fa5252;"></div>
                    <span>Eliminado</span>
                </div>
            </div>

            <canvas id="canvas"></canvas>

            <div class="stats">
                <div class="stat">
                    <span class="stat-number" id="comparisons">0</span>
                    <span>Comparaciones</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="steps">0</span>
                    <span>Pasos</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="time">0ms</span>
                    <span>Tiempo</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1000;
        canvas.height = 500;

        let array = [];
        let target = 0;
        let isSearching = false;
        let animationId = null;
        let currentStep = 0;
        let comparisons = 0;
        let startTime = 0;
        let speed = 600;

        // Estado para cada algoritmo
        let searchState = {
            linear: { index: 0 },
            binary: { left: 0, right: 0, mid: 0 },
            interpolated: { low: 0, high: 0, pos: 0 }
        };

        function initCanvas() {
            ctx.fillStyle = '#f8f9fa';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function generateArray() {
            const size = parseInt(document.getElementById('arraySize').value);
            array = [];
            for (let i = 0; i < size; i++) {
                array.push(Math.floor(Math.random() * 80) + 10);
            }
            // Asegurar que el target esté en el array
            target = array[Math.floor(Math.random() * size)];
            reset();
            drawArray();
        }

        function drawArray() {
            initCanvas();
            
            if (array.length === 0) return;

            const barWidth = (canvas.width - 60) / array.length;
            const maxHeight = canvas.height - 150;
            const maxVal = Math.max(...array);
            const startX = 30;
            const startY = canvas.height - 100;

            array.forEach((val, i) => {
                const x = startX + i * barWidth;
                const height = (val / maxVal) * maxHeight;
                const barX = x;
                const barY = startY - height;

                // Determinar color según estado
                let color = '#74c0fc'; // Normal (azul claro)
                
                if (isSearching) {
                    const algo = document.getElementById('algorithm').value;
                    if (algo === 'linear' && searchState.linear.index === i) {
                        color = '#ff6b6b'; // Actual (rojo)
                    } else if (algo === 'binary') {
                        const { left, right, mid } = searchState.binary;
                        if (i >= left && i <= right) color = '#fab005'; // Rango activo
                        if (i === mid) color = '#ff6b6b'; // Punto medio
                    } else if (algo === 'interpolated') {
                        const { low, high, pos } = searchState.interpolated;
                        if (i >= low && i <= high) color = '#fab005';
                        if (i === pos) color = '#ff6b6b';
                    }
                }

                if (val === target) {
                    color = '#51cf66'; // Encontrado (verde)
                }

                // Dibujar barra
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = 10;
                ctx.fillRect(barX, barY, barWidth - 2, height);
                ctx.shadowBlur = 0;

                // Borde
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(barX, barY, barWidth - 2, height);

                // Valor
                ctx.fillStyle = 'black';
                ctx.font = `${Math.min(20, barWidth)}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(val, barX + barWidth/2, barY + height/2);

                // Target highlight
                if (val === target && !isSearching) {
                    ctx.strokeStyle = '#51cf66';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(barX - 2, barY - 2, barWidth + 2, height + 4);
                }
            });

            // Información del target
            ctx.fillStyle = '#333';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`🎯 Objetivo: ${target}`, canvas.width/2, 40);

            // Eje Y
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(startX - 10, startY);
            ctx.lineTo(canvas.width - 20, startY);
            ctx.stroke();
        }

        function linearSearchStep() {
            if (searchState.linear.index >= array.length) {
                endSearch("No encontrado 😞");
                return;
            }

            const index = searchState.linear.index;
            comparisons++;
            updateStats();

            if (array[index] === target) {
                endSearch("¡Encontrado! 🎉");
                return;
            }

            searchState.linear.index++;
            currentStep++;
            drawArray();
        }

        function binarySearchStep() {
            const { left, right } = searchState.binary;
            
            if (left > right) {
                endSearch("No encontrado 😞");
                return;
            }

            const mid = Math.floor((left + right) / 2);
            searchState.binary.mid = mid;
            comparisons++;
            updateStats();

            if (array[mid] === target) {
                endSearch("¡Encontrado! 🎉");
                return;
            } else if (array[mid] < target) {
                searchState.binary.left = mid + 1;
            } else {
                searchState.binary.right = mid - 1;
            }

            currentStep++;
            drawArray();
        }

        function interpolatedSearchStep() {
            const { low, high } = searchState.interpolated;
            
            if (low > high || array[high] < target || array[low] > target) {
                endSearch("No encontrado 😞");
                return;
            }

            const range = array[high] - array[low];
            const targetRange = target - array[low];
            const pos = low + Math.floor((targetRange * (high - low)) / (range || 1));

            searchState.interpolated.pos = Math.max(0, Math.min(pos, high));
            comparisons++;
            updateStats();

            if (array[pos] === target) {
                endSearch("¡Encontrado! 🎉");
                return;
            } else if (array[pos] < target) {
                searchState.interpolated.low = pos + 1;
            } else {
                searchState.interpolated.high = pos - 1;
            }

            currentStep++;
            drawArray();
        }

        function startSearch() {
            if (array.length === 0) {
                alert("Genera un array primero 🎲");
                return;
            }

            isSearching = true;
            currentStep = 0;
            comparisons = 0;
            startTime = Date.now();
            searchState.linear.index = 0;
            searchState.binary = { left: 0, right: array.length - 1, mid: 0 };
            searchState.interpolated = { low: 0, high: array.length - 1, pos: 0 };

            document.querySelectorAll('button').forEach(btn => btn.disabled = true);
            animate();
        }

        function animate() {
            if (!isSearching) return;

            const algo = document.getElementById('algorithm').value;
            speed = parseInt(document.getElementById('speed').value);

            if (algo === 'linear') {
                linearSearchStep();
            } else if (algo === 'binary') {
                binarySearchStep();
            } else {
                interpolatedSearchStep();
            }

            if (isSearching) {
                animationId = setTimeout(animate, speed);
            }
        }

        function pauseSearch() {
            isSearching = false;
            clearTimeout(animationId);
            document.querySelectorAll('button').forEach(btn => btn.disabled = false);
        }

        function endSearch(message) {
            isSearching = false;
            clearTimeout(animationId);
            updateStats();
            alert(`${message}\nComparaciones: ${comparisons}\nPasos: ${currentStep}`);
            document.querySelectorAll('button').forEach(btn => btn.disabled = false);
        }

        function reset() {
            pauseSearch();
            initCanvas();
            searchState.linear.index = 0;
            searchState.binary = { left: 0, right: 0, mid: 0 };
            searchState.interpolated = { low: 0, high: 0, pos: 0 };
            currentStep = 0;
            comparisons = 0;
            updateStats();
        }

        function updateStats() {
            document.getElementById('comparisons').textContent = comparisons;
            document.getElementById('steps').textContent = currentStep;
            const elapsed = isSearching ? Date.now() - startTime : 0;
            document.getElementById('time').textContent = `${elapsed}ms`;
        }

        // Event Listeners
        document.getElementById('arraySize').addEventListener('input', function() {
            document.getElementById('sizeValue').textContent = this.value;
        });

        document.getElementById('speed').addEventListener('input', function() {
            const value = parseInt(this.value);
            const speeds = ['Muy Rápido', 'Rápido', 'Normal', 'Lento', 'Muy Lento'];
            document.getElementById('speedText').textContent = speeds[Math.floor((2000 - value) / 400)];
        });

        // Inicializar
        generateArray();
        drawArray();
        updateStats();
    </script>
</body>
</html>
